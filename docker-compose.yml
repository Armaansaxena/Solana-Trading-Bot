version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: solana-bot-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme123}
      MONGO_INITDB_DATABASE: solana-bot
    volumes:
      - mongodb_data:/data/db
    networks:
      - solana-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bot:
    build: .
    container_name: solana-bot
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - MONGODB_URI=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-changeme123}@mongodb:27017/solana-bot?authSource=admin
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - NODE_ENV=production
    networks:
      - solana-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodb_data:
    driver: local

networks:
  solana-network:
    driver: bridge