version: '3.8'

services:
  db:
    image: postgres:15
    container_name: solana-bot-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=solana_bot_user
      - POSTGRES_PASSWORD=local_password
      - POSTGRES_DB=solana_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - solana-network
    healthcheck:
      # FIX: Corrected user and database name for the healthcheck
      test: ["CMD-SHELL", "pg_isready -U solana_bot_user -d solana_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: solana-bot
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      # FIX: In Docker, the host is 'db' (the service name), NOT localhost or dpg-...
      - DATABASE_URL=postgresql://postgres:Armaansaxena@704@db.oqapbelkjwtyymcwkkaj.supabase.co:5432/postgres
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    networks:
      - solana-network

volumes:
  postgres_data:

networks:
  solana-network:
    driver: bridge